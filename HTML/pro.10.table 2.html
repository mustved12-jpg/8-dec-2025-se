<html>
    <head>
        <style>
            table
            {
                border: 2px solid black;

            {
                border: 2px solid black;
                text-align: center;
            }
            th{
                background-color: rgb(31, 149, 149);
                color: blue;
            }

                color: rgb(14, 11, 58);

                <tr>

                </tr>
                <tr>
                    <th>email</th>
                    <th>phone</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>

            </tbody>
        </table>

</html>
