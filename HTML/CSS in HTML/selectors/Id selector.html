<html>
    <head>
        <title>id selector</title>
        <style>
            h1
            {
                background-color: rgb(216, 149, 209);
                color:rgb(184, 252, 115);
            }
            #myid
            {
                background-color: aqua;
                color: blue;
                padding: 20px;
            }
            body
            {
                background-color: rgb(144, 163, 157);
            }
        </style>
    </head>
    <body>
        <h1>hello h1</h1>
        <h2 id="myid">hello h2 with id</h2>
        <h2>hello h2 whout id</h2>
        <h1>hello h1</h1>
        
    </body>
</html>
