<html>
    <head>
        <title>unorder list</title>
    </head>
    <body>
        <h1>Unorder List</h1>
            <ul>
                <li>python</li>
                <li>java</li>
                <li>php</li>
                <li>hello</li>
                <li>hello</li>
            </ul> 
    <hr>

            <ul= style="list-style-type=disc">
                <li>python</li>
                <li>java</li>
                <li>php</li>
                <li>hello</li>
                <li>hello</li>
            </ul> 
    
        <hr>

            <ul= style="list-style-type:square;">
                <li>python</li>
                <li>java</li>
                <li>php</li>
                <li>hello</li>
                <li>hello</li>
            </ul> 
        
        <hr>

            <ul= style="list-style-type:circle;">
                <li>python</li>
                <li>java</li>
                <li>php</li>
                <li>hello</li>
                <li>hello</li>
            </ul> 
        
        <hr>

            <ul= style="list-style-type:none;">
                <li>python</li>
                <li>java</li>
                <li>php</li>
                <li>hello</li>
                <li>hello</li>
            </ul> 
        </body>
</html>
